services:
  db:
    image: postgres:16
    container_name: limiarcontrol-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-limiarcontrol}
    volumes:
      - limiarcontrol_db:/var/lib/postgresql/data

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: limiarcontrol-centrifugo
    ports:
      - "8001:8000"
    command: centrifugo -c /centrifugo/config.json
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro,Z
    environment:
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_HMAC_SECRET_KEY:-dev-secret-change-me}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-dev-api-key}
      CENTRIFUGO_ALLOWED_ORIGINS: "${CENTRIFUGO_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000}"

volumes:
  limiarcontrol_db:
