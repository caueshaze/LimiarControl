services:
  db:
    image: postgres:16
    container_name: limiarcontrol-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-limiarcontrol}
    volumes:
      - limiarcontrol_db:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: limiarcontrol-centrifugo
    command: centrifugo -c /centrifugo/config.json
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro,Z
    environment:
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_SECRET:?CENTRIFUGO_TOKEN_SECRET is required}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:?CENTRIFUGO_API_KEY is required}
      CENTRIFUGO_ALLOWED_ORIGINS: ${CENTRIFUGO_ALLOWED_ORIGINS:?CENTRIFUGO_ALLOWED_ORIGINS is required}
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - internal
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: limiarcontrol-api
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-limiarcontrol}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CENTRIFUGO_API_URL: http://centrifugo:8000/api
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:?CENTRIFUGO_API_KEY is required}
      CENTRIFUGO_TOKEN_SECRET: ${CENTRIFUGO_TOKEN_SECRET:?CENTRIFUGO_TOKEN_SECRET is required}
      CENTRIFUGO_PUBLIC_URL: ${CENTRIFUGO_PUBLIC_URL:?CENTRIFUGO_PUBLIC_URL is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-false}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      centrifugo:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  limiarcontrol_db: